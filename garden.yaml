      fill="none"/><path d="M8 24 Q18 18 28 24" stroke="#a8d5a2" stroke-width="1.2"
      fill="none"/><rect x="17" y="9" width="2" height="4" rx="1" fill="#5d4037"/></svg>
  Calendula:
    description: Flor medicinal i comestible que repel·leix plagues i atrau pol·linitzadors.
    color: '#f5a623'
    svg: <svg viewBox="0 0 36 36" width="26" height="26" xmlns="http://www.w3.org/2000/svg"><circle
      cx="18" cy="18" r="5" fill="#f5a623"/><g fill="#f9d423"><ellipse cx="18" cy="7"
      rx="2.5" ry="5"/><ellipse cx="18" cy="7" rx="2.5" ry="5" transform="rotate(45
      18 18)"/><ellipse cx="18" cy="7" rx="2.5" ry="5" transform="rotate(90 18 18)"/><ellipse
      cx="18" cy="7" rx="2.5" ry="5" transform="rotate(135 18 18)"/><ellipse cx="18"
      cy="7" rx="2.5" ry="5" transform="rotate(180 18 18)"/><ellipse cx="18" cy="7"
      rx="2.5" ry="5" transform="rotate(225 18 18)"/><ellipse cx="18" cy="7" rx="2.5"
      ry="5" transform="rotate(270 18 18)"/><ellipse cx="18" cy="7" rx="2.5" ry="5"
      transform="rotate(315 18 18)"/></g><circle cx="18" cy="18" r="5" fill="#f5a623"/></svg>
  Albergínia Blanca:
    description: Varietat d'albergínia de pell blanca i sabor més suau que la morada,
      menys amarga.
    color: '#aaaaaa'
    svg: <svg viewBox="0 0 36 36" width="26" height="26" xmlns="http://www.w3.org/2000/svg"><ellipse
      cx="18" cy="22" rx="9" ry="11" fill="#f5f0e8" stroke="#ccc" stroke-width="1.2"/><ellipse
      cx="15" cy="14" rx="3" ry="4" fill="#8fbe6a" transform="rotate(-20 15 14)"/><ellipse
      cx="21" cy="13" rx="3" ry="4" fill="#8fbe6a" transform="rotate(20 21 13)"/><rect
      x="17" y="9" width="2" height="4" rx="1" fill="#5d4037"/></svg>
  Albergínia Llarga:
    description: Albergínia de forma allargada i pell morada fosca, textura ferma
      i poc amarga.
    color: '#6c3483'
    svg: <svg viewBox="0 0 36 36" width="26" height="26" xmlns="http://www.w3.org/2000/svg"><ellipse
      cx="18" cy="21" rx="7" ry="12" fill="#6c3483"/><ellipse cx="15" cy="10" rx="3"
      ry="4" fill="#8fbe6a" transform="rotate(-20 15 10)"/><ellipse cx="21" cy="9"
      rx="3" ry="4" fill="#8fbe6a" transform="rotate(20 21 9)"/><rect x="17" y="6"
      width="2" height="4" rx="1" fill="#5d4037"/></svg>
  Pebrot Piparra:
    description: Pebrot allargat i lleugerament picant, típic del País Basc. Ideal
      per fregir.
    color: '#5aaa3a'
    svg: <svg viewBox="0 0 36 36" width="26" height="26" xmlns="http://www.w3.org/2000/svg"><path
      d="M18 10 C14 14 12 20 13 27 C13.5 30 22.5 30 23 27 C24 20 22 14 18 10Z" fill="#5aaa3a"/><path
      d="M18 10 C17 16 16.5 22 17 28" stroke="#4a9030" stroke-width="0.8" fill="none"/><rect
      x="17" y="7" width="2" height="4" rx="1" fill="#5d4037"/><path d="M18 8 Q22
      5 24 7" stroke="#27ae60" stroke-width="1.2" fill="none" stroke-linecap="round"/></svg>
  Pebrot del Piquillo:
    description: Pebrot vermell dolç de Navarra, amb forma triangular. Ideal per farcir.
    color: '#c0392b'
    svg: <svg viewBox="0 0 36 36" width="26" height="26" xmlns="http://www.w3.org/2000/svg"><path
      d="M18 9 C12 13 10 20 13 26 C15 30 18 31 18 31 C18 31 21 30 23 26 C26 20 24
      13 18 9Z" fill="#c0392b"/><path d="M18 11 C16 16 15.5 22 16.5 28" stroke="#a93226"
      stroke-width="0.8" fill="none"/><ellipse cx="18" cy="9" rx="3.5" ry="2.5" fill="#27ae60"/><rect
      x="17" y="6" width="2" height="4" rx="1" fill="#5d4037"/></svg>
  Pebrot Vermell:
    description: Pebrot vermell carnós i dolç, perfecte per rostir, amanides i conserves.
    color: '#e74c3c'
    svg: <svg viewBox="0 0 36 36" width="26" height="26" xmlns="http://www.w3.org/2000/svg"><path
      d="M11 18 C11 11 25 11 25 18 C25 25 22 30 18 30 C14 30 11 25 11 18Z" fill="#e74c3c"/><path
      d="M14 15 C14 11 22 11 22 15" stroke="#c0392b" stroke-width="0.8" fill="none"/><path
      d="M18 13 C16 17 15.5 22 16.5 28" stroke="#c0392b" stroke-width="0.8" fill="none"/><path
      d="M18 13 C20 17 20.5 22 19.5 27" stroke="#c0392b" stroke-width="0.8" fill="none"/><ellipse
      cx="18" cy="10" rx="4" ry="3" fill="#27ae60"/><rect x="17" y="6" width="2" height="5"
      rx="1" fill="#5d4037"/></svg>
  Pebrot Nyora:
    description: Pebrot rodó, sec i molt aromàtic de pell vermell fosca. Imprescindible
      per a romescos, fideuades i salses tradicionals catalanes.
    color: '#8b1a1a'
    svg: <svg viewBox="0 0 36 36" width="26" height="26" xmlns="http://www.w3.org/2000/svg"><ellipse
      cx="18" cy="22" rx="11" ry="9" fill="#8b1a1a"/><ellipse cx="14" cy="18" rx="4"
      ry="3" fill="#a52020" opacity="0.4"/><path d="M8 22 Q18 18 28 22" stroke="#6b1010"
      stroke-width="0.9" fill="none"/><path d="M9 26 Q18 22 27 26" stroke="#6b1010"
      stroke-width="0.7" fill="none"/><rect x="17" y="11" width="2" height="4" rx="1"
      fill="#5d4037"/><path d="M18 12 Q22 9 24 11" stroke="#27ae60" stroke-width="1.2"
      fill="none" stroke-linecap="round"/></svg>
  Maduixa:
    description: Fruita de primavera dolça i aromàtica. Necessita regar sovint i sol
      directe.
    color: '#e91e63'
    svg: <svg viewBox="0 0 36 36" width="26" height="26" xmlns="http://www.w3.org/2000/svg"><path
      d="M18 28 C13 24 9 18 10 13 C11 9 15 9 18 12 C21 9 25 9 26 13 C27 18 23 24 18
      28Z" fill="#e91e63"/><circle cx="14" cy="17" r="1" fill="#fff" opacity="0.6"/><circle
      cx="19" cy="14" r="1" fill="#fff" opacity="0.6"/><circle cx="21" cy="21" r="1"
      fill="#fff" opacity="0.6"/><circle cx="15" cy="23" r="1" fill="#fff" opacity="0.6"/><path
      d="M14 10 Q18 7 22 10" stroke="#27ae60" stroke-width="2" fill="none" stroke-linecap="round"/><line
      x1="18" y1="8" x2="18" y2="12" stroke="#27ae60" stroke-width="1.5"/></svg>
  Enciam Roure:
    description: Enciam de fulla de roure, textura mantecosa. Ideal per amanides.
    color: '#5aaa3a'
    svg: <svg viewBox="0 0 36 36" width="26" height="26" xmlns="http://www.w3.org/2000/svg"><circle
      cx="18" cy="19" r="12" fill="#7dc67a"/><path d="M10 15 Q18 9 26 15" stroke="#5aaa3a"
      stroke-width="1" fill="none"/><path d="M8 20 Q18 13 28 20" stroke="#5aaa3a"
      stroke-width="1" fill="none"/><path d="M10 25 Q18 18 26 25" stroke="#5aaa3a"
      stroke-width="1" fill="none"/><circle cx="18" cy="19" r="5" fill="#a8d5a2" opacity="0.7"/><circle
      cx="18" cy="19" r="2" fill="#27ae60"/></svg>
  Enciam Trocadero Vermell:
    description: Enciam de cap dens i fulles vermelloses, suau i lleugerament dolç.
    color: '#5aaa3a'
    svg: <svg viewBox="0 0 36 36" width="26" height="26" xmlns="http://www.w3.org/2000/svg"><circle
      cx="18" cy="19" r="12" fill="#7dc67a"/><path d="M10 15 Q18 9 26 15" stroke="#5aaa3a"
      stroke-width="1" fill="none"/><path d="M8 20 Q18 13 28 20" stroke="#5aaa3a"
      stroke-width="1" fill="none"/><path d="M10 25 Q18 18 26 25" stroke="#5aaa3a"
      stroke-width="1" fill="none"/><circle cx="18" cy="19" r="5" fill="#a8d5a2" opacity="0.7"/><circle
      cx="18" cy="19" r="2" fill="#27ae60"/></svg>
  Enciam Trocadero Verd:
    description: Enciam de cap dens i fulles verdes, textura mantecosa i sabor suau.
    color: '#5aaa3a'
    svg: <svg viewBox="0 0 36 36" width="26" height="26" xmlns="http://www.w3.org/2000/svg"><circle
      cx="18" cy="19" r="12" fill="#7dc67a"/><path d="M10 15 Q18 9 26 15" stroke="#5aaa3a"
      stroke-width="1" fill="none"/><path d="M8 20 Q18 13 28 20" stroke="#5aaa3a"
      stroke-width="1" fill="none"/><path d="M10 25 Q18 18 26 25" stroke="#5aaa3a"
      stroke-width="1" fill="none"/><circle cx="18" cy="19" r="5" fill="#a8d5a2" opacity="0.7"/><circle
      cx="18" cy="19" r="2" fill="#27ae60"/></svg>
  Escarola:
    description: Verdura de fulla rizada i sabor lleugerament amarg. Rica en vitamines
      i minerals.
    color: '#a8c880'
    svg: <svg viewBox="0 0 36 36" width="26" height="26" xmlns="http://www.w3.org/2000/svg"><path
      d="M18 29 C11 25 7 19 9 13 C10 9 14 8 17 11 C15 7 18 5 18 5 C18 5 21 7 19 11
      C22 8 26 9 27 13 C29 19 25 25 18 29Z" fill="#c8e6a0"/><path d="M18 29 C15 23
      12 18 13 13" stroke="#a8c880" stroke-width="0.8" fill="none"/><path d="M18 29
      C21 23 24 18 23 13" stroke="#a8c880" stroke-width="0.8" fill="none"/><circle
      cx="18" cy="17" r="4" fill="#e8f5c8" opacity="0.7"/></svg>
  Espinacs:
    description: Verdura de fulla verda molt nutritiva, rica en ferro i vitamines.
      Versàtil a la cuina.
    color: '#2ecc71'
    svg: <svg viewBox="0 0 36 36" width="26" height="26" xmlns="http://www.w3.org/2000/svg"><path
      d="M18 8 C14 8 9 12 9 18 C9 24 13 29 18 30 C23 29 27 24 27 18 C27 12 22 8 18
      8Z" fill="#2ecc71"/><path d="M18 8 L18 30" stroke="#27ae60" stroke-width="1.2"
      fill="none"/><path d="M9 18 L27 18" stroke="#27ae60" stroke-width="0.8" fill="none"/><path
      d="M11 12 L25 24" stroke="#27ae60" stroke-width="0.6" fill="none"/><path d="M25
      12 L11 24" stroke="#27ae60" stroke-width="0.6" fill="none"/></svg>
  Bleda:
    description: Verdura de tija blanca i fulla verda gran. Suau de sabor i fàcil
      de cuinar.
    color: '#27ae60'
    svg: <svg viewBox="0 0 36 36" width="26" height="26" xmlns="http://www.w3.org/2000/svg"><ellipse
      cx="18" cy="20" rx="11" ry="9" fill="#27ae60"/><path d="M18 11 L18 29" stroke="#fff"
      stroke-width="2" fill="none"/><path d="M9 18 Q13 14 18 11 Q23 14 27 18" stroke="#fff"
      stroke-width="1.2" fill="none"/><path d="M10 22 Q14 18 18 16 Q22 18 26 22" stroke="#fff"
      stroke-width="1" fill="none" opacity="0.7"/></svg>
  Enciam Maravella:
    description: Enciam clàssic de cap rodó i fulles verdes crocants. Molt productiu
      i resistent.
    color: '#5aaa3a'
    svg: <svg viewBox="0 0 36 36" width="26" height="26" xmlns="http://www.w3.org/2000/svg"><circle
      cx="18" cy="19" r="12" fill="#7dc67a"/><path d="M10 15 Q18 9 26 15" stroke="#5aaa3a"
      stroke-width="1" fill="none"/><path d="M8 20 Q18 13 28 20" stroke="#5aaa3a"
      stroke-width="1" fill="none"/><path d="M10 25 Q18 18 26 25" stroke="#5aaa3a"
      stroke-width="1" fill="none"/><circle cx="18" cy="19" r="5" fill="#a8d5a2" opacity="0.7"/><circle
      cx="18" cy="19" r="2" fill="#27ae60"/></svg>
  Carbassó de Nàpols:
    description: Carbassó rodó originari de Nàpols, de sabor dolç i textura mantecosa.
    color: '#5aaa3a'
    svg: <svg viewBox="0 0 36 36" width="26" height="26" xmlns="http://www.w3.org/2000/svg"><ellipse
      cx="18" cy="20" rx="6" ry="12" fill="#5aaa3a" transform="rotate(-10 18 20)"/><ellipse
      cx="16" cy="10" rx="5" ry="3" fill="#8fbe6a" transform="rotate(-10 16 10)"/><rect
      x="17" y="6" width="2" height="4" rx="1" fill="#5d4037" transform="rotate(-10
      18 8)"/><ellipse cx="14" cy="19" rx="2" ry="5" fill="#4a9030" opacity="0.4"
      transform="rotate(-10 14 19)"/></svg>
  Tomàquet de Montserrat:
    description: Tomàquet autòcton català de costelles pronunciades, molt carnós i
      poc àcid.
    color: '#e74c3c'
    svg: <svg viewBox="0 0 36 36" width="26" height="26" xmlns="http://www.w3.org/2000/svg"><circle
      cx="18" cy="21" r="11" fill="#e74c3c"/><ellipse cx="13" cy="17" rx="3" ry="4"
      fill="#f1948a" opacity="0.45"/><ellipse cx="18" cy="11" rx="5" ry="3" fill="#27ae60"/><rect
      x="17" y="7" width="2" height="4" rx="1" fill="#5d4037"/></svg>
  Tomàquet de Barbastro:
    description: Tomàquet aragonès de sabor intens i textura ferma, ideal per amanides.
    color: '#e74c3c'
    svg: <svg viewBox="0 0 36 36" width="26" height="26" xmlns="http://www.w3.org/2000/svg"><circle
      cx="18" cy="21" r="11" fill="#e74c3c"/><ellipse cx="13" cy="17" rx="3" ry="4"
      fill="#f1948a" opacity="0.45"/><ellipse cx="18" cy="11" rx="5" ry="3" fill="#27ae60"/><rect
      x="17" y="7" width="2" height="4" rx="1" fill="#5d4037"/></svg>
  Tomàquet Rosa Ple:
    description: Tomàquet de color rosat i molt carnós, quasi sense llavors. Sabor
      dolç i suau.
    color: '#e74c3c'
    svg: <svg viewBox="0 0 36 36" width="26" height="26" xmlns="http://www.w3.org/2000/svg"><circle
      cx="18" cy="21" r="11" fill="#e74c3c"/><ellipse cx="13" cy="17" rx="3" ry="4"
      fill="#f1948a" opacity="0.45"/><ellipse cx="18" cy="11" rx="5" ry="3" fill="#27ae60"/><rect
      x="17" y="7" width="2" height="4" rx="1" fill="#5d4037"/></svg>
  Tomàquet Caramba:
    description: Tomàquet de sabor intens i equilibrat, molt productiu i resistent
      a malalties. Fa tomàquets molt grans, fins a 1kg.
    color: '#c0392b'
    svg: <svg viewBox="0 0 36 36" width="26" height="26" xmlns="http://www.w3.org/2000/svg"><circle
      cx="18" cy="21" r="11" fill="#e74c3c"/><ellipse cx="13" cy="17" rx="3" ry="4"
      fill="#f1948a" opacity="0.45"/><ellipse cx="18" cy="11" rx="5" ry="3" fill="#27ae60"/><rect
      x="17" y="7" width="2" height="4" rx="1" fill="#5d4037"/></svg>
  Tomàquet Kumato:
    description: Tomàquet de color marró fosc i sabor dolç intens. Varietat híbrida
      molt apreciada.
    color: '#e74c3c'
    svg: <svg viewBox="0 0 36 36" width="26" height="26" xmlns="http://www.w3.org/2000/svg"><circle
      cx="18" cy="21" r="11" fill="#e74c3c"/><ellipse cx="13" cy="17" rx="3" ry="4"
      fill="#f1948a" opacity="0.45"/><ellipse cx="18" cy="11" rx="5" ry="3" fill="#27ae60"/><rect
      x="17" y="7" width="2" height="4" rx="1" fill="#5d4037"/></svg>
  Tomàquet de Penjar República:
    description: Tomàquet de penjar de varietat tradicional, excel·lent per conservar
      penjat durant mesos.
    color: '#e74c3c'
    svg: <svg viewBox="0 0 36 36" width="26" height="26" xmlns="http://www.w3.org/2000/svg"><circle
      cx="18" cy="21" r="11" fill="#e74c3c"/><ellipse cx="13" cy="17" rx="3" ry="4"
      fill="#f1948a" opacity="0.45"/><ellipse cx="18" cy="11" rx="5" ry="3" fill="#27ae60"/><rect
      x="17" y="7" width="2" height="4" rx="1" fill="#5d4037"/></svg>
  Tomàquet Pit de Monja Cor de Bou:
    description: Tomàquet gran i carnós de forma irregular, molt carnós i amb poc
      suc.
    color: '#e74c3c'
    svg: <svg viewBox="0 0 36 36" width="26" height="26" xmlns="http://www.w3.org/2000/svg"><circle
      cx="18" cy="21" r="11" fill="#e74c3c"/><ellipse cx="13" cy="17" rx="3" ry="4"
      fill="#f1948a" opacity="0.45"/><ellipse cx="18" cy="11" rx="5" ry="3" fill="#27ae60"/><rect
      x="17" y="7" width="2" height="4" rx="1" fill="#5d4037"/></svg>
  Tomàquet Esquena Verd:
    description: Tomàquet amb l'esquena verda característica, sabor intens i molt
      apreciat pels entesos.
    color: '#e74c3c'
    svg: <svg viewBox="0 0 36 36" width="26" height="26" xmlns="http://www.w3.org/2000/svg"><circle
      cx="18" cy="21" r="11" fill="#e74c3c"/><ellipse cx="13" cy="17" rx="3" ry="4"
      fill="#f1948a" opacity="0.45"/><ellipse cx="18" cy="11" rx="5" ry="3" fill="#27ae60"/><rect
      x="17" y="7" width="2" height="4" rx="1" fill="#5d4037"/></svg>
  Tomàquet de Penjar de Manacor:
    description: Varietat mallorquina de tomàquet de penjar, dolç i de llarga conservació.
    color: '#e74c3c'
    svg: <svg viewBox="0 0 36 36" width="26" height="26" xmlns="http://www.w3.org/2000/svg"><circle
      cx="18" cy="21" r="11" fill="#e74c3c"/><ellipse cx="13" cy="17" rx="3" ry="4"
      fill="#f1948a" opacity="0.45"/><ellipse cx="18" cy="11" rx="5" ry="3" fill="#27ae60"/><rect
      x="17" y="7" width="2" height="4" rx="1" fill="#5d4037"/></svg>
  Tomàquet Cor de Bou Pit de Monja:
    description: Tomàquet de forma acostada al cor, molt carnós, amb poca llavor i
      sabor intens.
    color: '#e74c3c'
    svg: <svg viewBox="0 0 36 36" width="26" height="26" xmlns="http://www.w3.org/2000/svg"><circle
      cx="18" cy="21" r="11" fill="#e74c3c"/><ellipse cx="13" cy="17" rx="3" ry="4"
      fill="#f1948a" opacity="0.45"/><ellipse cx="18" cy="11" rx="5" ry="3" fill="#27ae60"/><rect
      x="17" y="7" width="2" height="4" rx="1" fill="#5d4037"/></svg>
  Tomàquet Cor de Bou de Liguria:
    description: Tomàquet italià de Ligúria en forma de cor, molt carnós i quasi sense
      llavors. Sabor dolç i delicat, excel·lent per menjar cru.
    color: '#e74c3c'
    svg: <svg viewBox="0 0 36 36" width="26" height="26" xmlns="http://www.w3.org/2000/svg"><circle
      cx="18" cy="21" r="11" fill="#e74c3c"/><ellipse cx="13" cy="17" rx="3" ry="4"
      fill="#f1948a" opacity="0.45"/><ellipse cx="18" cy="11" rx="5" ry="3" fill="#27ae60"/><rect
      x="17" y="7" width="2" height="4" rx="1" fill="#5d4037"/></svg>
  Carbassó Normal:
    description: Carbassó de varietat clàssica, allargat i verd, molt productiu i
      versàtil a la cuina.
    color: '#5aaa3a'
    svg: <svg viewBox="0 0 36 36" width="26" height="26" xmlns="http://www.w3.org/2000/svg"><ellipse
      cx="18" cy="20" rx="6" ry="12" fill="#5aaa3a" transform="rotate(-10 18 20)"/><ellipse
      cx="16" cy="10" rx="5" ry="3" fill="#8fbe6a" transform="rotate(-10 16 10)"/><rect
      x="17" y="6" width="2" height="4" rx="1" fill="#5d4037" transform="rotate(-10
      18 8)"/><ellipse cx="14" cy="19" rx="2" ry="5" fill="#4a9030" opacity="0.4"
      transform="rotate(-10 14 19)"/></svg>
  Pèsols de Mata Baixa:
    description: Varietat de pèsol de port baix que no necessita tutor. Productiva
      i fàcil de collir.
    color: '#27ae60'
    svg: <svg viewBox="0 0 36 36" width="26" height="26" xmlns="http://www.w3.org/2000/svg"><path
      d="M7 20 Q7 9 18 7 Q29 9 29 20 Q29 29 18 31 Q7 29 7 20Z" fill="#a8d5a2" stroke="#5aaa3a"
      stroke-width="1.2"/><circle cx="12" cy="20" r="3.5" fill="#27ae60"/><circle
      cx="18" cy="16" r="3.5" fill="#27ae60"/><circle cx="24" cy="21" r="3.5" fill="#27ae60"/></svg>
  Pèsols de Llàgrima:
    description: Pèsol fi i dolcíssim, molt apreciat a la gastronomia basca. Es menja
      cru o poc cuit.
    color: '#27ae60'
    svg: <svg viewBox="0 0 36 36" width="26" height="26" xmlns="http://www.w3.org/2000/svg"><path
      d="M7 20 Q7 9 18 7 Q29 9 29 20 Q29 29 18 31 Q7 29 7 20Z" fill="#a8d5a2" stroke="#5aaa3a"
      stroke-width="1.2"/><circle cx="12" cy="20" r="3.5" fill="#27ae60"/><circle
      cx="18" cy="16" r="3.5" fill="#27ae60"/><circle cx="24" cy="21" r="3.5" fill="#27ae60"/></svg>
  Pèsols Negre del Berguedà:
    description: Varietat tradicional catalana de pèsol de gra negre, molt aromàtica
      i de sabor intens.
    color: '#27ae60'
    svg: <svg viewBox="0 0 36 36" width="26" height="26" xmlns="http://www.w3.org/2000/svg"><path
      d="M7 20 Q7 9 18 7 Q29 9 29 20 Q29 29 18 31 Q7 29 7 20Z" fill="#a8d5a2" stroke="#5aaa3a"
      stroke-width="1.2"/><circle cx="12" cy="20" r="3.5" fill="#27ae60"/><circle
      cx="18" cy="16" r="3.5" fill="#27ae60"/><circle cx="24" cy="21" r="3.5" fill="#27ae60"/></svg>
  Cogombre:
    description: Verdura refrescant i hidratant, ideal per amanides i escabetxos.
      Creix ràpid a l'estiu.
    color: '#3a7d2c'
    svg: <svg viewBox="0 0 36 36" width="26" height="26" xmlns="http://www.w3.org/2000/svg"><ellipse
      cx="19" cy="21" rx="13" ry="7" fill="#3a7d2c" transform="rotate(-30 19 21)"/><ellipse
      cx="19" cy="21" rx="10" ry="5.5" fill="#5aaa3a" transform="rotate(-30 19 21)"/><circle
      cx="12" cy="26" r="1.5" fill="#2d6124"/><circle cx="16" cy="23" r="1.5" fill="#2d6124"/><circle
      cx="20" cy="20" r="1.5" fill="#2d6124"/><circle cx="24" cy="17" r="1.5" fill="#2d6124"/><ellipse
      cx="9" cy="28" rx="3" ry="2" fill="#8fbe6a" transform="rotate(-30 9 28)"/><rect
      x="25" y="10" width="2" height="4" rx="1" fill="#5d4037" transform="rotate(-30
      26 12)"/></svg>
  Col:
    description: Verdura de fulla gran i ondulada. Rica en vitamina C i molt resistent
      al fred.
    color: '#5aaa3a'
    svg: <svg viewBox="0 0 36 36" width="26" height="26" xmlns="http://www.w3.org/2000/svg"><path
      d="M18 30 C10 28 6 22 8 16 C9 11 13 10 16 13 C13 8 17 6 18 6 C19 6 23 8 20 13
      C23 10 27 11 28 16 C30 22 26 28 18 30Z" fill="#7dc67a"/><path d="M18 30 C15
      24 13 18 14 13" stroke="#5aaa3a" stroke-width="0.9" fill="none"/><path d="M18
      30 C21 24 23 18 22 13" stroke="#5aaa3a" stroke-width="0.9" fill="none"/><ellipse
      cx="18" cy="20" rx="5" ry="6" fill="#a8d5a2" opacity="0.5"/></svg>
  Enciam de Sucre Negre:
    description: Enciam de varietat fosca i fulles tendres, lleugerament dolç. Molt
      ornamental.
    color: '#5aaa3a'
    svg: <svg viewBox="0 0 36 36" width="26" height="26" xmlns="http://www.w3.org/2000/svg"><circle
      cx="18" cy="19" r="12" fill="#7dc67a"/><path d="M10 15 Q18 9 26 15" stroke="#5aaa3a"
      stroke-width="1" fill="none"/><path d="M8 20 Q18 13 28 20" stroke="#5aaa3a"
      stroke-width="1" fill="none"/><path d="M10 25 Q18 18 26 25" stroke="#5aaa3a"
      stroke-width="1" fill="none"/><circle cx="18" cy="19" r="5" fill="#a8d5a2" opacity="0.7"/><circle
      cx="18" cy="19" r="2" fill="#27ae60"/></svg>
  Sindria:
    description: Fruita d'estiu extremadament refrescant i sucosa, ideal per
      menjar freda els dies de calor. Necessita molt sol i espai per
      desenvolupar-se.
    color: '#c0392b'
    svg: <svg viewBox="0 0 36 36" width="26" height="26" xmlns="http://www.w3.org/2000/svg"><path
      d="M2 30 A16 16 0 0 1 34 30 Z" fill="#2d6a2f"/><path d="M5 30 A13 13 0 0
      1 31 30 Z" fill="#f2f0e6"/><path d="M8 30 A10 10 0 0 1 28 30 Z" fill="#e0362f"/><circle
      cx="14" cy="24" r="1" fill="#1a1a1a"/><circle cx="18" cy="27" r="1" fill="#1a1a1a"/><circle
      cx="22" cy="23" r="1" fill="#1a1a1a"/><circle cx="16" cy="20" r="1" fill="#1a1a1a"/><circle
      cx="21" cy="19" r="1" fill="#1a1a1a"/></svg>
  Pebrot xino Chaotianjiao:
    description: Bitxo xinès molt picant, de fruits petits i drets que apunten
      cap amunt, típic de la cuina de Sichuan i Hunan. Creix en petits raïms
      erectes.
    color: '#c0392b'
    svg: <svg viewBox="0 0 36 36" width="26" height="26" xmlns="http://www.w3.org/2000/svg"><path
      d="M10 14 C8 18 8 24 9 28 C9.5 30 10.5 31 11 31 C11.5 31 12.5 30 13 28
      C14 24 14 18 12 14 Z" fill="#a9342a"/><path d="M9 27 L11 25 L13 27 L12
      30 L10 30 Z" fill="#4a7d2e"/><path d="M23 14 C25 18 25 24 24 28 C23.5 30
      22.5 31 22 31 C21.5 31 20.5 30 20 28 C19 24 19 18 21 14 Z" fill="#a9342a"/><path
      d="M20 27 L22 25 L24 27 L23 30 L21 30 Z" fill="#4a7d2e"/><path d="M18 4
      C15 9 14 17 15 26 C15.3 29 17 31.5 18 31.5 C19 31.5 20.7 29 21 26 C22 17
      21 9 18 4 Z" fill="#c0392b"/><path d="M14 25 L18 21 L22 25 L20.5 30
      L15.5 30 Z" fill="#5a9139"/></svg>
  Pebrot xino Er Jing Tiao:
    description: Varietat xinesa de Sichuan, allargada i penjant, amb picor
      moderada i molt d'oli. Ideal per elaborar oli de xili i pasta de bitxo
      (doubanjiang).
    color: '#8e2e1f'
    svg: <svg viewBox="0 0 36 36" width="26" height="26" xmlns="http://www.w3.org/2000/svg"><path
      d="M18 6 C12 8 10 14 12 20 C13 24 16 29 19 30 C21 30.5 22 28 21 25 C19
      19 20 12 24 8 C22 6 20 5 18 6 Z" fill="#8e2e1f"/><path d="M15 8 L18 5
      L21 7 L20 10 L16 10 Z" fill="#4a7d2e"/></svg>
  Alfàbrega:
    description: Planta aromàtica imprescindible a la cuina mediterrània,
      d'olor intens i sabor fresc. Li agrada la calor i el sol directe.
    color: '#3f7d3a'
    svg: <svg viewBox="0 0 36 36" width="26" height="26" xmlns="http://www.w3.org/2000/svg"><path
      d="M18 30 L18 12" stroke="#4a7d2e" stroke-width="2" fill="none"/><path
      d="M18 20 C14 19 11 16 10 12 C15 12 18 15 18 20 Z" fill="#4a9b3e"/><path
      d="M18 20 C22 19 25 16 26 12 C21 12 18 15 18 20 Z" fill="#3f7d3a"/><path
      d="M18 13 C15 12 13 9 12 6 C16 6 18 8.5 18 13 Z" fill="#4a9b3e"/><path
      d="M18 13 C21 12 23 9 24 6 C20 6 18 8.5 18 13 Z" fill="#3f7d3a"/><ellipse
      cx="18" cy="7" rx="2.5" ry="4" fill="#5aaa3a"/></svg>
