catalog:
  Carbassa Gran:
    description: Varietat de carbassa de mida gran, ideal per rostir i fer cremes.
    color: '#c0550a'
    svg: <svg viewBox="0 0 36 36" width="26" height="26" xmlns="http://www.w3.org/2000/svg"><ellipse
      cx="11" cy="23" rx="6" ry="8" fill="#c0550a"/><ellipse cx="18" cy="22" rx="7"
      ry="9" fill="#e67e22"/><ellipse cx="25" cy="23" rx="6" ry="8" fill="#c0550a"/><ellipse
      cx="18" cy="22" rx="4" ry="9" fill="#d4651a" opacity="0.5"/><rect x="17" y="11"
      width="2.5" height="5" rx="1.2" fill="#5d4037"/><path d="M18 13 Q22 9 25 11"
      stroke="#27ae60" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
  Carbassa Violina:
    description: Carbassa allargada de pell beix i polpa taronja dolça, molt apreciada
      a la cuina italiana.
    color: '#d4724a'
    svg: <svg viewBox="0 0 36 36" width="26" height="26" xmlns="http://www.w3.org/2000/svg"><ellipse
      cx="18" cy="25" rx="9" ry="7" fill="#d4724a"/><ellipse cx="18" cy="13" rx="4.5"
      ry="5" fill="#d4724a"/><rect x="16.5" y="17" width="3" height="8" rx="1.5" fill="#c0622a"/><rect
      x="17" y="7" width="2" height="5" rx="1" fill="#5d4037"/><path d="M19 8 Q23
      5 25 7" stroke="#27ae60" stroke-width="1.2" fill="none" stroke-linecap="round"/></svg>
  Meló:
    description: Fruita d'estiu de polpa dolça i perfumada. Necessita calor i sol
      abundant.
    color: '#c8a830'
    svg: <svg viewBox="0 0 36 36" width="26" height="26" xmlns="http://www.w3.org/2000/svg"><ellipse
      cx="18" cy="20" rx="13" ry="10" fill="#a8d5a2"/><ellipse cx="18" cy="20" rx="10"
      ry="7.5" fill="#f9e4a0"/><path d="M8 16 Q18 10 28 16" stroke="#a8d5a2" stroke-width="1.2"
